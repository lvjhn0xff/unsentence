Chapter No: 1
Name: Database Application Development

Objectives: 
  - Define terms 
  - Explain three components of client/server systems presentation, processing, and storage 
  - Distinguish between two-tier and three tier architectures 
  - Describe how to connect to database in 2-tier systems in 2-tier systems using VB.NET and Java 
  - Describe key components and information flow in Web applications 
  - Describe how to connect to databases in 3-tier applications using JSP, PHP, and ASP.NET 
  - Explain the purpose of XML 
  - See how XQuery can be used to query XML documents 
  - Explain how XML fosters Web Services and SOAs 

Sections: 
  - Client/Server Architectures: 
      Terminologies: 
        Client: Workstation (usually a PC) that requests and uses a service 
        Server: Computer (PC/mini/mainframe) that provides a service 
      Notes: 
        - Networked computing model.
        - Processes distributed between clients and servers. 
        - For DBMS, server is a database server. 

  - Application Logic in C/S Systems: 
      UnorderedSets :
          Types of Application Logic in C/S Systems: 
            Tags: 
              - Types
            Items: 
              - Presentation Logic:
                - GUI Interface 
                - Input - keyboard/mouse 
                - Output - monitor / printer 
              - Processing Logic:
                - Procedures, functions, and programs 
                - I/O processing 
                - Business rules 
                - Data management
              - Storage Logic:  
                - DBMS activities
                - Data storage/retrieval


  - Application Partitioning: 
      Terminologies: 
        Application Partitioning: Placing portions of the application code in different locations (client vs. server) after it is written. 
      OrderedSets: 
        Advantages of Application Partitioning: 
          Tags: 
            - Advantages
          Items:
            - Improved performance
            - Improved interoperability 
            - Balanced workloads 
        Types of Common Logic Distributions: 
          Tags: 
            - Types
          Items:
            - Fat Client 
            - Thin Client 
            - Distributed 
            - Three Tier 
            - N-tier
      Illustrations: 
        - Fat Client 
        - Thin Client 
        - Distributed 
        - Three Tier 
        - N-tier   

  - Two-Tier Database Server Architectures: 
      OrderedSets: 
        Responsibilities of a Client Workstation: 
          Tags: 
            - Responsibilities
          Types:
            - Presentation Logic 
            - Data Processing Logic 
            - Business Rules Logic 
        Roles of Server: 
          - Performs data storage 
          - Performs access 
          - Performs processing 
      Notes: 
        - Typically called a database server. 
        - DBMS is only on server. 

  - Characteristics of Two-Tier Client/Server System: 
      Notes:
        - Departmental in scope (few users)
        - Not mission-critical 
        - Low transaction volumes 
        - Common programming languages 
        - Interface database via middleware APIs

  - Middleware and APIs:
      Terminologies: 
        - Middleware: Software that allows an application to interoperate with other software without requiring user to understand and code low-level operations
        - Application Program Interface (API): Routines that an application uses to direct the performance of procedures by the computer's operating system. 
      UnorderedSets:
        Examples of Common Database APIs:
          Tags: 
            - Examples
          Items: 
            - ODBC
            - ADO 
            - .NET 
            - JDBC 

  - Steps for Using Databases via Middleware and APIs: 
      OrderedSets: 
        Steps: 
          - Identify and register a database driver 
          - Open a connection to a database 
          - Execute the query against the database 
          - Process the results of the query 
          - Repeat the steps 3-4 as necessary 
          - Close the connection to the database 

  - Thin Client: 
      OrderedSets: 
        Parts of a Three-Tier Architecture: 
          Tags: 
            - Parts
          Items:
            Client:
              - GUI interface 
              - Browser 
            Application Server: 
              - Business rules 
              - Web Server 
            Database Server:
              - Data Storage 
              - DBMS  

      OrderedSets:
        Definitions/Descriptions of a Thin Client: 
          Tags: 
            - Definition
            - Description
          Items:
            - An application where the client (PC) accessing the application primarily provides the user interfaces and some application processing, usually with no or limited local data storage.
            - PC just for user interface and a little application processing. Limited or no data storage (sometimes no hard drive)
      Notes: 
        - Routines that an application uses to direct the performance of procedures by the computer's operating system
      Illustrations: 
        - A database-enabled intranet/extranet environment.
        - Generic Three-Tier Architecture 

