  - Languages for Creating Web Pages: 
      Terminologies: 
        Hypertext Markup Language (HTML): Markup language specific for Web Pages 
        Standard Generalized Markup Language (SGML): Markup language standard 
        XHTML: XML-compiliant extension of HTML 
        JavaScript/VBScript: Scripting languages that enable interactivity in HTML documents 
        Cascading Stylesheets: Control appearance of Web elements in an HML document
        XSL and XSLT: XMS style sheet and transformation to HTML

  - Processing in 3-Tier Applications: 
      Notes:
        Static Page Requests:
          - .htm or .html requests handled by the Web server
        Dynamic Page Requests: 
          - .jsp, .aspx, and .php requests are routed to the application server
          - Server-side processing by JSP servlet, ASP .NET application, ColdFusion, or PHP
          - XMS style sheet and tranDatabase access via JDBC, ADO .NET, or other database middlewaresformation to HTML
      Illustrations: 
        - Information flow in a three-tier architecture

  - Considerations in 3-Tier Applications: 
      Notes: 
        Stored Procedures: 
          - Code logic embedded in DBMS 
          - Improve performance, but proprietary 
        Transactions: 
          - Involve many database updates 
          - Either all must succeed, or non-should occur

  - Benefits of Stored Procedures: 
      Notes: 
        - Performance improves for compiled SQL statements 
        - Reduced network traffic 
        - Improved security 
        - Improved data integrity 
        - Thinner clients

  - Benefits of Three-Tier Architectures: 
      Notes:
        - Scalability 
        - Technological flexibility 
        - Long-term cost reduction
        - Better match of systems to business needs 
        - Improved customer service 
        - Competitive advantage 
        - Reduced risk 

  - Cloud Computing: 
      Terminologies: 
        Cloud Computing: A model for creating ubiquituous, convenient, on-demand access to network services 
        Characteristics: On-demand, broad network, resource pooling, rapid elasticity, measured service 
      Examples: 
        Types of Cloud Computing: 
          - Infrastructure-as-a-Service (IaaS) 
          - Platform-as-a-Service (PaaS) 
          - Software-as-a-Service (SaaS)

  - Extensible Markup Language (XML): 
      Notes: 
        - A text-based language (like HTML)
        - Revolutionized the way data are exchanged over the Internet 
        - Document Structure Declarations (DSD), XML Schema (XSD), and Relax NG replacing DTDs for validating XML document structure 
        - XSD - language for defining XML databases, recommended by the W3C 

  - Storing XML Documents: 
      Notes: 
        - Storing as files introduces the same file processing states in Ch 1
      UnorderedSets: 
        - List of Four Common Options:
            Items: 
              - List 
            Tags:
              - Store XML data in a relational database by shredding the XML document 
              - Store entire XML document in a large field (BLOB or CLOB) 
              - Store the XML document using special XML columns 
              - Store the XML document using a native XML database (non-relational) 

  - Retrieving XML Documents: 
      Terminologies: 
        XPath  : One of a UnorderedSets XML technologies, 
        XQuery : An XML transformation language that allows app

  - Displaying XML Data:
      Terminologies:
        Extensible Stylesheet Language Transformation (XLST):  A language used to transform complex XML documents and alos used to create HTML pages from XML documents 
      Notes: 
        - XSLT can translate a single XML document into both standard HTML and WAP/WML for cell phones without the necessity for two different pages

  - XML and Web Services: 
      Teminologies: 
        Web Services: a UnorderedSets of emerging XML-based standards that define protocols for automatic communication between software programs over the Web
        Universal Description, Discovery, and Integration (UDDI): standard for creating and distributing Web services
        Web Services Description Language (WSDL): XML-based grammar for describing a Web Service and specifying its public interface
        Simple Object Access Protocol (SOAP): XML-based communication protocol for sending messages between applications over the Internet

  - Service Oriented Architecture (SOA): 
      Terminologies: 
        Service Oriented Architecture (SOA): A collection of services that communicate with each other, usually by passing data or coordinating a business activity
      Notes: 
        - A new paradigm for IT application development, based mostly on Web services
        - Loosely coupled, highly interoperable components.
        - Leads to flexibility and shorter development time.

