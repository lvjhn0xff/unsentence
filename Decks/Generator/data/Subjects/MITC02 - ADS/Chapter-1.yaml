      Terminologies: 
        Database Server: It hosts the DBMS 
        Web Server: It receives and responds to browser requests using HTTP protocol.
        Application Server: Software building blocks for creating dynamic web sites building blocks for creating dynamic web sites.
        Web Browser: Client program that sends web requests and receives web pages.
